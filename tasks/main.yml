---
- name: Ensure services are down
  delegate_to: localhost
  ansible.builtin.command:
    cmd: '{{ docker_command }} down'
    chdir: '{{ [playbook_dir, local_docker_directory] | path_join }}'

- name: Copy data to docker data directories
  delegate_to: localhost
  become: yes
  ansible.builtin.synchronize:
    src: "{{ [playbook_dir, 'data', item.value.path | basename] | path_join }}"
    dest: '{{ [playbook_dir, local_docker_directory] | path_join }}'
    delete: true
  loop: "{{ data_dirs | dict2items | selectattr('value.pull') }}"

- name: Ensure correct ownership of docker data directories
  delegate_to: localhost
  become: yes
  ansible.builtin.file:
    path: '{{ [playbook_dir, local_docker_directory, item.value.path | basename] | path_join }}'
    owner: '{{ item.value.owner | default(omit) }}'
    group: '{{ item.value.group | default(omit) }}'
    recurse: yes
  loop: "{{ data_dirs | dict2items | selectattr('value.pull') }}"

- name: Create data directies that have not been pulled
  delegate_to: localhost
  become: yes
  ansible.builtin.file:
    state: directory
    path: '{{ [playbook_dir, local_docker_directory, item.value.path | basename] | path_join }}'
    owner: '{{ item.value.owner | default(omit) }}'
    group: '{{ item.value.group | default(omit) }}'
    mode: "{{ item.value.mode | default('0755') }}" # hmm?
  loop: "{{ data_dirs | dict2items | rejectattr('value.pull') }}"
